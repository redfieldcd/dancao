<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-W16N56MSJP"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-W16N56MSJP');
    </script>
    <title>Dan Cao</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
        }

        h1 {
            color: #ffffff;
            font-size: clamp(1rem, 2.5vw, 1.5rem);
            font-weight: 300;
            letter-spacing: 0.15em;
            opacity: 0;
            animation: fadeIn 2s ease forwards;
        }

        h1 span {
            font-weight: 600;
        }

        .enter-btn {
            margin-top: 3rem;
            opacity: 0;
            animation: fadeIn 2s ease 1s forwards;
        }

        .enter-btn a {
            color: #ffffff;
            text-decoration: none;
            font-size: 0.75rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            padding: 0.75rem 2rem;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }

        .enter-btn a:hover {
            background: #ffffff;
            color: #0a0a0a;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to <span>Dan Cao</span>'s world</h1>
        <div class="enter-btn">
            <a href="about.html">Enter</a>
        </div>
    </div>
</body>
</html>
